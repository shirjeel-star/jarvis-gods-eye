<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Outer hexagon frame -->
  <polygon points="50,4 93,27 93,73 50,96 7,73 7,27"
    fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linejoin="round"/>
  <!-- Vertex corner ticks -->
  <line x1="50" y1="4"  x2="50" y2="0"       stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="93" y1="27" x2="96.5" y2="25"    stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="93" y1="73" x2="96.5" y2="75"    stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="50" y1="96" x2="50" y2="100"     stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="7"  y1="73" x2="3.5"  y2="75"    stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="7"  y1="27" x2="3.5"  y2="25"    stroke="#0ea5e9" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Outer dashed ring -->
  <circle cx="50" cy="50" r="33" fill="none" stroke="#0ea5e9" stroke-width="1"
    stroke-dasharray="5 3.5" opacity="0.55"/>
  <!-- Middle solid ring -->
  <circle cx="50" cy="50" r="22" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Inner iris ring -->
  <circle cx="50" cy="50" r="12" fill="none" stroke="#7dd3fc" stroke-width="1.5"/>
  <!-- Core fill -->
  <circle cx="50" cy="50" r="6"  fill="#0ea5e9" opacity="0.9"/>
  <circle cx="50" cy="50" r="2.5" fill="white"/>
  <!-- Crosshairs (gap to middle ring) -->
  <line x1="50" y1="22" x2="50" y2="34" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="66" x2="50" y2="78" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="50" x2="34" y2="50" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="66" y1="50" x2="78" y2="50" stroke="#0ea5e9" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Diagonal micro ticks at 45° -->
  <line x1="36" y1="36" x2="40" y2="40" stroke="#0ea5e9" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="64" y1="36" x2="60" y2="40" stroke="#0ea5e9" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="36" y1="64" x2="40" y2="60" stroke="#0ea5e9" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="64" y1="64" x2="60" y2="60" stroke="#0ea5e9" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
</svg>
